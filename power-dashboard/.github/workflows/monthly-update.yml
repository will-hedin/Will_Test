name: Monthly Epoch AI Data Centers Update

on:
  schedule:
    # Runs at 06:00 UTC on the 1st of every month
    - cron: "0 6 1 * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  update-data-centers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update script
        run: python scripts/update_data_centers.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet data/data_centers.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data_centers.js
          git commit -m "Monthly update: refresh Epoch AI data centers ($(date +'%b %Y'))"
          git push
