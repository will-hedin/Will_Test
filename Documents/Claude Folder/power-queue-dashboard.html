<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Data Center Power & Interconnection Queue Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#e2e8f0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5}
a{color:#4f8ef7;text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:1700px;margin:0 auto;padding:16px}
header{background:linear-gradient(135deg,#1a1d27 0%,#12151f 100%);border-bottom:1px solid #2d3148;padding:20px 24px;margin-bottom:20px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
header h1{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.3px}
header h1 span{color:#4f8ef7}
.header-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.badge{background:#1e2235;border:1px solid #2d3148;border-radius:6px;padding:4px 10px;font-size:12px;color:#94a3b8}
.badge.live{border-color:#22c55e;color:#22c55e}
.badge.warn{border-color:#f59e0b;color:#f59e0b}
</style>
</head>
<body>
<div class="container">
<header>
  <div>
    <h1>US Data Center <span>Power &amp; Interconnection Queue</span> Dashboard</h1>
  </div>
  <div class="header-meta">
    <span class="badge">Updated May 11, 2026</span>
  </div>
</header>
</div>
</body>
</html>
